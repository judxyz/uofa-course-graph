name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uofa-course-graph
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: uofa-course-graph/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m compileall -q .
        working-directory: uofa-course-graph
      - run: python -c "from app import handler; print('handler:', type(handler).__name__)"
        working-directory: uofa-course-graph

  scraper:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall -q .
        working-directory: scraper
      - run: pytest -q
        working-directory: scraper

  sam-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          version: 1.142.1
      - run: cp requirements.txt uofa-course-graph/requirements.txt
      - run: sam validate --template-file template.yaml
      - run: sam build --template-file template.yaml
