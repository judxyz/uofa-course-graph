name: Deploy backend (AWS SAM)

on:
  push:
    branches: [main]
    paths:
      - "uofa-prereq-graph/app.py"
      - "uofa-prereq-graph/graph_builder.py"
      - "uofa-prereq-graph/.samignore"
      - "requirements.txt"
      - "template.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Optional repo Variables; fall back to samconfig.toml defaults in the check step.
      AWS_REGION: ${{ vars.AWS_REGION }}
      SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate GitHub and AWS configuration
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${AWS_DEPLOY_ROLE_ARN}" ]; then
            echo "::error::Missing repository Secret: AWS_DEPLOY_ROLE_ARN"
            echo "  IAM role ARN for GitHub OIDC (see README — Deploy API)."
            missing=1
          fi

          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::Missing repository Secret: DATABASE_URL"
            missing=1
          fi

          if [ -z "${AWS_REGION}" ]; then
            echo "AWS_REGION not set; using default us-east-1 (set a repo Variable to override)."
            echo "AWS_REGION=us-east-1" >> "$GITHUB_ENV"
          fi

          if [ -z "${SAM_STACK_NAME}" ]; then
            echo "SAM_STACK_NAME not set; using default uofa-prereq-api (set a repo Variable to override)."
            echo "SAM_STACK_NAME=uofa-prereq-api" >> "$GITHUB_ENV"
          fi

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Required GitHub configuration:"
            echo "  Secrets:  AWS_DEPLOY_ROLE_ARN, DATABASE_URL"
            echo "  Optional: CORS_EXTRA_ORIGINS (defaults to Vercel production URL)"
            echo "  Variables (optional): AWS_REGION, SAM_STACK_NAME"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          version: 1.142.1

      - name: Build
        run: |
          cp requirements.txt uofa-prereq-graph/requirements.txt
          sam build --template-file template.yaml

      - name: Deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_EXTRA_ORIGINS: ${{ secrets.CORS_EXTRA_ORIGINS }}
        run: |
          set -euo pipefail
          DEFAULT_CORS="https://uofa-prereq-graph.vercel.app"
          CORS="${CORS_EXTRA_ORIGINS:-$DEFAULT_CORS}"
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --stack-name "${SAM_STACK_NAME}" \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              "DatabaseUrl=${DATABASE_URL}" \
              "CorsExtraOrigins=${CORS}"
