AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string (DATABASE_URL) for the Lambda function.
  CorsExtraOrigins:
    Type: String
    Default: "https://uofa-prereq-graph.vercel.app"
    Description: Extra CORS origins (comma-separated), merged in app.py with defaults.

Resources:
  UofAPrereqApi:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: uofa-prereq-graph/
      Handler: app.handler
      Runtime: python3.12
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          CORS_EXTRA_ORIGINS: !Ref CorsExtraOrigins
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"